const DEMO_DATA = {"slug":"apr29-jul33-ytd","period":"YTD","bond1":{"isin":"ROJVM8ELBDU4","name":"Apr-29","maturity_date":"2029-04-25","coupon":6.3,"type":"ROMGB","currency":"RON","quote_type":"yield"},"bond2":{"isin":"ROPG9LZUB0O2","name":"Jul-33","maturity_date":"2033-07-27","coupon":7.5,"type":"ROMGB","currency":"RON","quote_type":"yield"},"fx_rates":{"RON":4.55,"EUR":0.92,"USD":1.0},"dates":["2026-01-05","2026-01-06","2026-01-07","2026-01-08","2026-01-09","2026-01-12","2026-01-13","2026-01-14","2026-01-15","2026-01-16","2026-01-19","2026-01-20","2026-01-21","2026-01-22","2026-01-23","2026-01-26","2026-01-27","2026-01-28","2026-01-29","2026-01-30","2026-02-02","2026-02-03","2026-02-04","2026-02-05","2026-02-06","2026-02-09","2026-02-10","2026-02-11","2026-02-12","2026-02-13","2026-02-16","2026-02-17","2026-02-18","2026-02-19","2026-02-20","2026-02-23","2026-02-24","2026-02-25","2026-02-26","2026-02-27","2026-03-02","2026-03-03","2026-03-04","2026-03-05","2026-03-06","2026-03-09","2026-03-10","2026-03-11","2026-03-12","2026-03-13","2026-03-16","2026-03-17","2026-03-18","2026-03-19","2026-03-20","2026-03-23","2026-03-24","2026-03-25","2026-03-26","2026-03-27","2026-03-30","2026-03-31","2026-04-01","2026-04-02","2026-04-03","2026-04-06","2026-04-07","2026-04-08","2026-04-09"],"spread":[0.3388,0.337,0.3423,0.3576,0.3657,0.3631,0.3771,0.3818,0.3841,0.386,0.3855,0.3896,0.3859,0.3771,0.3635,0.3523,0.3565,0.3711,0.3754,0.3821,0.397,0.3967,0.4099,0.429,0.4474,0.4518,0.4586,0.4596,0.4604,0.4407,0.4346,0.4078,0.3747,0.3628,0.3482,0.35,0.3485,0.3327,0.3396,0.332,0.3367,0.341,0.3496,0.3627,0.3708,0.3731,0.3747,0.3708,0.3543,0.3366,0.3202,0.3108,0.2931,0.2973,0.2722,0.2512,0.2518,0.2595,0.2609,0.269,0.2844,0.2882,0.2851,0.2943,0.3157,0.3135,0.3243,0.3329,0.3326],"stats":{"last":0.3326,"mean":0.3548,"median":0.3565,"stdev":0.0514,"off_avg":-0.0222,"stdev_from_mean":-0.4324,"percentile":26.09,"high":0.4604,"high_date":"2026-02-12","low":0.2512,"low_date":"2026-03-23"},"last_yields":[6.85,7.2],"last_prices":[98.5282,101.603],"last_settle":["2026-04-11","2026-04-11"],"published_at":"2026-04-09T10:00:00Z","expires_at":"2030-01-01T00:00:00Z"};

/* ═══════════════════════════════════════════════════════════════════════════
   BOND MATH  (mirrors bond_pricing.py exactly)
   ═══════════════════════════════════════════════════════════════════════════ */

function daysBetween(a, b) {
  // a, b are Date objects; returns integer day count (b - a)
  return Math.round((b.getTime() - a.getTime()) / 86400000);
}

function parseDate(s) {
  if (!s) return null;
  const p = s.split('-');
  return new Date(+p[0], +p[1] - 1, +p[2]);
}

function _lastCouponOnOrBefore(matDate, settleDate) {
  // Same month/day as matDate, the most recent year ≤ settleDate
  const m = matDate.getMonth(), d = matDate.getDate();
  let yr = settleDate.getFullYear();
  let cpn = new Date(yr, m, d);
  if (cpn > settleDate) { yr--; cpn = new Date(yr, m, d); }
  return cpn;
}

function _nextCouponDates(matDate, lastCpn) {
  // All coupon dates strictly after lastCpn up to and including matDate
  const m = matDate.getMonth(), d = matDate.getDate();
  const result = [];
  let yr = lastCpn.getFullYear() + 1;
  while (true) {
    const cpn = new Date(yr, m, d);
    if (cpn > matDate) break;
    result.push(cpn);
    yr++;
  }
  // Ensure matDate is included (handles rounding)
  if (!result.length || result[result.length - 1].getTime() !== matDate.getTime()) {
    result.push(new Date(matDate.getTime()));
  }
  return result;
}

function dirtyPrice(coupon, yieldPct, matDate, settleDate) {
  const dtm = daysBetween(settleDate, matDate);
  if (dtm <= 0) return 100 + coupon;
  const y = yieldPct / 100;
  const lastCpn = _lastCouponOnOrBefore(matDate, settleDate);

  if (dtm < 365) {
    // Short bond — simple interest, ACT/period denominator
    const daysInPeriod = daysBetween(lastCpn, matDate);
    return (100 + coupon) / (1 + y * dtm / daysInPeriod);
  }

  // Long bond — ACT/ACT annual compounding
  const remaining = _nextCouponDates(matDate, lastCpn);
  const nextCpn = remaining[0];
  const daysInPeriod = daysBetween(lastCpn, nextCpn);
  const w = daysBetween(settleDate, nextCpn) / daysInPeriod;
  const n = remaining.length;
  let dp = 0;
  for (let i = 0; i < n; i++) {
    const cf = (i < n - 1) ? coupon : coupon + 100;
    dp += cf / Math.pow(1 + y, w + i);
  }
  return dp;
}

function cleanPrice(coupon, yieldPct, matDate, settleDate) {
  const dtm = daysBetween(settleDate, matDate);
  const lastCpn = _lastCouponOnOrBefore(matDate, settleDate);
  let daysInPeriod;
  if (dtm < 365) {
    daysInPeriod = daysBetween(lastCpn, matDate);
  } else {
    const nextCpn = _nextCouponDates(matDate, lastCpn)[0];
    daysInPeriod = daysBetween(lastCpn, nextCpn);
  }
  const daysSinceLast = daysBetween(lastCpn, settleDate);
  const accrued = daysInPeriod > 0 ? coupon * daysSinceLast / daysInPeriod : 0;
  return dirtyPrice(coupon, yieldPct, matDate, settleDate) - accrued;
}

function calcDV01(coupon, yieldPct, matDate, settleDate, notionalK) {
  // Central difference: (price(y−1bp) − price(y+1bp)) / 2, scaled to notional
  const pDn = dirtyPrice(coupon, yieldPct - 0.01, matDate, settleDate);
  const pUp = dirtyPrice(coupon, yieldPct + 0.01, matDate, settleDate);
  return (pDn - pUp) / 2 * (notionalK * 1000) / 100;
}

// Newton-Raphson: compute yield from clean price
function yieldFromCleanPrice(coupon, targetPx, matDate, settleDate) {
  let y = coupon / 100; // starting guess
  for (let i = 0; i < 60; i++) {
    const px   = cleanPrice(coupon, y * 100, matDate, settleDate);
    const pxUp = cleanPrice(coupon, (y + 0.00005) * 100, matDate, settleDate);
    const pxDn = cleanPrice(coupon, (y - 0.00005) * 100, matDate, settleDate);
    const dpdy = (pxUp - pxDn) / 0.0001;
    if (Math.abs(dpdy) < 1e-12) break;
    const delta = (px - targetPx) / dpdy;
    y -= delta;
    if (Math.abs(delta) < 1e-9) break;
  }
  return y * 100;
}

// T+2 settlement (weekdays only — no holiday calendar)
function defaultSettlement() {
  let d = new Date();
  let added = 0;
  while (added < 2) {
    d.setDate(d.getDate() + 1);
    if (d.getDay() !== 0 && d.getDay() !== 6) added++;
  }
  return d.toISOString().slice(0, 10);
}

/* ═══════════════════════════════════════════════════════════════════════════

let _bonds = [];

const params = new URLSearchParams(location.search);

} else {
  const url = `https://raw.githubusercontent.com/conticap/spreads-public/main/data/${encodeURIComponent(slug)}.json`;

    .catch(e => {
      document.getElementById('error').style.display = '';
      document.getElementById('error').textContent = e.message;
      document.getElementById('header').style.display = 'none';
    });
}

/* ═══════════════════════════════════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════════════════════════════════ */
function render(data) {
  // Expiry check
  if (data.expires_at) {
    if (Date.now() > new Date(data.expires_at).getTime()) {
      document.getElementById('expiry-banner').style.display = '';
      ['header','charts','statsGrid','spreadInterpret','calcPanel'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });
      return;
    }
  }

  const expStr = data.expires_at
    ? new Date(data.expires_at).toLocaleString([], { dateStyle:'medium', timeStyle:'short' })
    : '';
  if (expStr) {
    document.getElementById('footer').textContent =
      `Published ${new Date(data.published_at || data.expires_at).toLocaleDateString()} · expires ${expStr}`;
  }

  _bonds = [data.bond1, data.bond2];
  _fxRates = data.fx_rates || {};
  _allData = data;

  // Header
  const b1n = data.bond1.name || data.bond1.isin;
  const b2n = data.bond2.name || data.bond2.isin;
  document.title = `${b1n} vs ${b2n}`;
  document.getElementById('title').textContent = `${b1n}  −  ${b2n}`;

  // Period bar
  const pb = document.getElementById('periodBar');
  pb.style.display = 'flex';
  pb.querySelectorAll('.pbtn[data-p]').forEach(btn => {
    btn.addEventListener('click', () => {
      pb.querySelectorAll('.pbtn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      _activePeriod = btn.dataset.p;
      applyPeriod(_activePeriod);
    });
  });

  // Set date inputs to full range
  document.getElementById('pfrom').value = data.dates[0];
  document.getElementById('pto').value   = data.dates[data.dates.length - 1];

  buildCalc(data);
  applyPeriod('5Y');
}

/* ─── Period filtering ───────────────────────────────────────────── */
function applyPeriod(period) {
  if (!_allData) return;
  const allDates = _allData.dates;
  const last = allDates[allDates.length - 1];
  const lastD = new Date(last);
  let fromD;
  if (period === '5Y')  fromD = new Date(lastD.getFullYear()-5, lastD.getMonth(), lastD.getDate());
  else if (period === '1Y')  fromD = new Date(lastD.getFullYear()-1, lastD.getMonth(), lastD.getDate());
  else if (period === '6M')  fromD = new Date(lastD.getFullYear(), lastD.getMonth()-6, lastD.getDate());
  else if (period === '3M')  fromD = new Date(lastD.getFullYear(), lastD.getMonth()-3, lastD.getDate());
  else if (period === '1M')  fromD = new Date(lastD.getFullYear(), lastD.getMonth()-1, lastD.getDate());
  else if (period === 'YTD') fromD = new Date(lastD.getFullYear(), 0, 1);
  else fromD = new Date(allDates[0]);
  const fromStr = fromD.toISOString().slice(0, 10);
  document.getElementById('pfrom').value = fromStr;
  document.getElementById('pto').value   = last;
  renderPeriod(fromStr, last);
}

function applyCustomRange() {
  const from = document.getElementById('pfrom').value;
  const to   = document.getElementById('pto').value;
  if (!from || !to) return;
  document.getElementById('periodBar').querySelectorAll('.pbtn').forEach(b => b.classList.remove('active'));
  renderPeriod(from, to);
}

function recomputeStats(dates, spreadBp) {
  const n = spreadBp.length;
  if (!n) return null;
  const last  = spreadBp[n - 1];
  const mean  = spreadBp.reduce((a, b) => a + b, 0) / n;
  const sorted = [...spreadBp].sort((a, b) => a - b);
  const median = sorted[Math.floor(n / 2)];
  const stdev  = Math.sqrt(spreadBp.reduce((a, v) => a + (v - mean) ** 2, 0) / n) || 0;
  const hi = Math.max(...spreadBp), lo = Math.min(...spreadBp);
  const hiIdx = spreadBp.indexOf(hi), loIdx = spreadBp.indexOf(lo);
  const below = spreadBp.filter(v => v < last).length;
  return {
    last:   +(last/100).toFixed(4),  mean: +(mean/100).toFixed(4),  median: +(median/100).toFixed(4),
    stdev:  +(stdev/100).toFixed(4),  off_avg: +((last - mean)/100).toFixed(4),
    stdev_from_mean: stdev > 0 ? +((last - mean) / stdev).toFixed(4) : 0,
    percentile: +(below / n * 100).toFixed(2),
    high: +(hi/100).toFixed(4), high_date: dates[hiIdx],
    low:  +(lo/100).toFixed(4), low_date:  dates[loIdx],
    // Pass already-in-bp values for chart use
    _last_bp: last, _mean_bp: mean, _hi_bp: hi, _lo_bp: lo,
  };
}

function renderPeriod(fromStr, toStr) {
  if (!_allData) return;
  const idxFrom = _allData.dates.findIndex(d => d >= fromStr);
  const idxTo   = _allData.dates.reduce((acc, d, i) => d <= toStr ? i : acc, -1);
  if (idxFrom < 0 || idxTo < 0 || idxFrom > idxTo) return;

  const dates   = _allData.dates.slice(idxFrom, idxTo + 1);
  const spread  = _allData.spread.slice(idxFrom, idxTo + 1);
  const spreadBp = spread.map(s => +(s * 100).toFixed(2));

  const b1n = _allData.bond1.name || _allData.bond1.isin;
  const b2n = _allData.bond2.name || _allData.bond2.isin;

  document.getElementById('subtitle').textContent =
    `${_allData.bond1.type || ''} Spread · ${dates[0]} to ${dates[dates.length - 1]}`;

  const maxVal = Math.max(...spreadBp), minVal = Math.min(...spreadBp);
  const maxIdx = spreadBp.indexOf(maxVal), minIdx = spreadBp.indexOf(minVal);
  const yPad   = (maxVal - minVal) * 0.08 || 2;
  const yRange  = [minVal - yPad, maxVal + yPad];
  const slicedData = { ..._allData, dates, spread };

  renderLineChart(slicedData, spreadBp, maxVal, minVal, maxIdx, minIdx, yRange, b1n, b2n);
  renderHistChart(slicedData, spreadBp, yRange);

  // Recompute stats from visible window
  const stats = recomputeStats(dates, spreadBp);
  renderStats(stats);
  renderInterpretation(stats);
}

/* ─── Line chart ─────────────────────────────────────────────────── */
function insertZeroCrossings(dates, vals) {
  const outD = [], outV = [];
  for (let i = 0; i < vals.length; i++) {
    if (i > 0 && vals[i-1] != null && vals[i] != null &&
        ((vals[i-1] > 0 && vals[i] < 0) || (vals[i-1] < 0 && vals[i] > 0))) {
      const t  = vals[i-1] / (vals[i-1] - vals[i]);
      const d0 = new Date(dates[i-1]).getTime();
      const d1 = new Date(dates[i]).getTime();
      outD.push(new Date(d0 + t * (d1 - d0)).toISOString().slice(0, 10));
      outV.push(0);
    }
    outD.push(dates[i]); outV.push(vals[i]);
  }
  return { dates: outD, vals: outV };
}

function renderLineChart(data, spreadBp, maxVal, minVal, maxIdx, minIdx, yRange, b1n, b2n) {
  const { dates: xFull, vals: vFull } = insertZeroCrossings(data.dates, spreadBp);
  const posClip = vFull.map(v => v >= 0 ? v : null);
  const negClip = vFull.map(v => v <= 0 ? v : null);

  const traces = [
    { x:xFull, y:posClip, type:'scatter', mode:'none', fill:'tozeroy', fillcolor:'rgba(46,213,115,0.18)', hoverinfo:'skip', showlegend:false, connectgaps:false },
    { x:xFull, y:negClip, type:'scatter', mode:'none', fill:'tozeroy', fillcolor:'rgba(231,76,60,0.20)',  hoverinfo:'skip', showlegend:false, connectgaps:false },
    { x:xFull, y:vFull,   type:'scatter', mode:'lines', line:{color:'#e2e8f0',width:1.5}, hoverinfo:'none', showlegend:false },
    { x:[data.dates[0], data.dates[data.dates.length-1]], y:[0,0], type:'scatter', mode:'lines', line:{color:'#4a6380',width:1,dash:'dash'}, showlegend:false, hoverinfo:'skip' },
  ];

  const shapes = [], annotations = [];
  annotations.push({ xref:'paper', yref:'paper', x:0.01, y:1.02, text:`${b1n} − ${b2n}`, showarrow:false, font:{size:12,color:'#c8d6e5'}, xanchor:'left', yanchor:'bottom' });
  if (data.stats && data.stats.mean != null) {
    const mBp = +(data.stats.mean * 100).toFixed(2);
    shapes.push({ type:'line', xref:'x', yref:'y', x0:data.dates[0], x1:data.dates[data.dates.length-1], y0:mBp, y1:mBp, line:{color:'#f39c12',width:1,dash:'dot'} });
    annotations.push({ xref:'paper', yref:'y', x:0.01, y:mBp, text:`Mean ${mBp.toFixed(1)}`, showarrow:false, font:{size:10,color:'#f39c12'}, xanchor:'left', yanchor:'bottom' });
  }

  let firstMax = true, firstMin = true;
  spreadBp.forEach((v, i) => {
    if (v === maxVal) {
      const r = firstMax ? 8 : 4; firstMax = false;
      shapes.push({ type:'circle', xref:'x', yref:'y', xsizemode:'pixel', ysizemode:'pixel', xanchor:data.dates[i], yanchor:v, x0:-r, x1:r, y0:-r, y1:r, fillcolor:'#2ed573', line:{color:'#fff',width:r===8?1.5:1} });
    }
    if (v === minVal) {
      const r = firstMin ? 8 : 4; firstMin = false;
      shapes.push({ type:'circle', xref:'x', yref:'y', xsizemode:'pixel', ysizemode:'pixel', xanchor:data.dates[i], yanchor:v, x0:-r, x1:r, y0:-r, y1:r, fillcolor:'#e74c3c', line:{color:'#fff',width:r===8?1.5:1} });
    }
  });

  const lineEl = document.getElementById('lineChart');
  Plotly.newPlot(lineEl, traces, {
    paper_bgcolor:'#0f1923', plot_bgcolor:'#0f1923', font:{color:'#c8d6e5',size:11},
    margin:{l:55,r:10,t:28,b:40}, showlegend:false,
    xaxis:{ gridcolor:'rgba(46,63,80,0.5)', tickfont:{size:10,color:'#8395a7'}, linecolor:'#2e3f50' },
    yaxis:{ gridcolor:'rgba(46,63,80,0.5)', tickfont:{size:10,color:'#8395a7'}, title:{text:'Spread (bp)',font:{size:11,color:'#8395a7'}}, range:yRange, zeroline:false, linecolor:'#2e3f50' },
    shapes, annotations, hovermode:'x',
  }, { responsive:true, displayModeBar:false });

  // Sync histogram Y-axis on line chart zoom
  lineEl.on('plotly_relayout', ev => {
    const u = {};
    if (ev['yaxis.range[0]'] !== undefined) u['yaxis.range[0]'] = ev['yaxis.range[0]'];
    if (ev['yaxis.range[1]'] !== undefined) u['yaxis.range[1]'] = ev['yaxis.range[1]'];
    if (Object.keys(u).length) Plotly.relayout(document.getElementById('histChart'), u);
  });

  // Hover tooltip (shared)
  const tt = document.getElementById('chartTooltip');
  lineEl.on('plotly_hover', ev => {
    const pt = ev.points.find(p => p.curveNumber === 2); if (!pt) return;
    const col = pt.y >= 0 ? '#2ed573' : '#e74c3c';
    const prefix = pt.y === spreadBp[maxIdx] ? 'Max: ' : pt.y === spreadBp[minIdx] ? 'Min: ' : '';
    tt.innerHTML = `<div style="color:#8395a7;margin-bottom:3px">${pt.x}</div><div style="color:${col};font-size:14px;font-weight:600">${prefix}${pt.y >= 0 ? '+' : ''}${pt.y.toFixed(2)} bp</div>`;
    tt.style.display = 'block';
  });
  lineEl.on('plotly_unhover', () => { tt.style.display = 'none'; });

  document.addEventListener('mousemove', ev => {
    if (tt.style.display === 'none') return;
    const x = ev.clientX + 16, y = ev.clientY - 10;
    tt.style.left = (x + tt.offsetWidth > window.innerWidth ? ev.clientX - tt.offsetWidth - 8 : x) + 'px';
    tt.style.top  = (y + tt.offsetHeight > window.innerHeight ? ev.clientY - tt.offsetHeight - 8 : y) + 'px';
  }, { passive: true });
}

/* ─── Histogram ──────────────────────────────────────────────────── */
function renderHistChart(data, spreadBp, yRange) {
  const n  = spreadBp.length;
  const mn = spreadBp.reduce((a, b) => a + b, 0) / n;
  const sd = Math.sqrt(spreadBp.reduce((a, v) => a + (v - mn) ** 2, 0) / n) || 0.001;
  const lo = Math.min(...spreadBp), hi = Math.max(...spreadBp);
  const pad = (hi - lo) * 0.05 || 0.5;
  const hLo = lo - pad, hHi = hi + pad;
  const BINS = 25, bSz = (hHi - hLo) / BINS;
  const counts = Array(BINS).fill(0);
  for (const v of spreadBp) { const k = Math.min(Math.floor((v - hLo) / bSz), BINS - 1); if (k >= 0) counts[k]++; }
  const centers = Array.from({ length:BINS }, (_, k) => +(hLo + (k + 0.5) * bSz).toFixed(3));
  const edgeLo  = Array.from({ length:BINS }, (_, k) => +(hLo + k * bSz).toFixed(3));
  const edgeHi  = Array.from({ length:BINS }, (_, k) => +(hLo + (k + 1) * bSz).toFixed(3));
  const colors  = centers.map(c => c >= 0 ? 'rgba(46,213,115,0.60)' : 'rgba(231,76,60,0.60)');
  const borders = centers.map(c => c >= 0 ? '#2ed573' : '#e74c3c');
  const maxCnt  = Math.max(...counts) || 1;
  const curveY  = Array.from({ length:80 }, (_, k) => hLo + (hHi - hLo) * k / 79);
  const curveX  = curveY.map(y => {
    const pdf = Math.exp(-0.5 * ((y - mn) / sd) ** 2) / (sd * Math.sqrt(2 * Math.PI));
    return +(pdf / (1 / (sd * Math.sqrt(2 * Math.PI))) * maxCnt).toFixed(2);
  });

  const sorted = [...spreadBp].sort((a, b) => a - b);
  const q1 = sorted[Math.floor(n * 0.25)], med = sorted[Math.floor(n * 0.50)], q3 = sorted[Math.floor(n * 0.75)];
  const hShapes = [];
  [[mn,'#f39c12','dot'],[q1,'#74b9ff','dash'],[med,'#74b9ff','dash'],[q3,'#74b9ff','dash']].forEach(([y,c,d]) =>
    hShapes.push({ type:'line', xref:'paper', yref:'y', x0:0, x1:1, y0:y, y1:y, line:{color:c,width:1,dash:d} })
  );

  const histEl = document.getElementById('histChart');
  Plotly.newPlot(histEl, [
    { x:counts, y:centers, type:'bar', orientation:'h', marker:{color:colors,line:{color:borders,width:0.8}}, showlegend:false, hoverinfo:'none' },
    { x:curveX, y:curveY,  type:'scatter', mode:'lines', line:{color:'#f39c12',width:1.5}, showlegend:false, hoverinfo:'skip' },
  ], {
    paper_bgcolor:'#0f1923', plot_bgcolor:'#0f1923', font:{color:'#c8d6e5',size:11},
    margin:{l:6,r:44,t:30,b:40}, showlegend:false,
    xaxis:{ title:{text:'Days',font:{size:10,color:'#8395a7'}}, gridcolor:'rgba(46,63,80,0.3)', linecolor:'#2e3f50', tickfont:{size:9,color:'#8395a7'}, rangemode:'tozero' },
    yaxis:{ range:yRange, gridcolor:'rgba(46,63,80,0.5)', linecolor:'#2e3f50', tickfont:{size:9,color:'#8395a7'}, zeroline:false, side:'right' },
    shapes:hShapes, bargap:0.04, hovermode:'closest',
  }, { responsive:true, displayModeBar:false });

  const tt = document.getElementById('chartTooltip');
  histEl.on('plotly_hover', ev => {
    const pt = ev.points.find(p => p.curveNumber === 0); if (!pt) return;
    const k = centers.indexOf(pt.y); if (k < 0) return;
    tt.innerHTML = `<div style="color:#8395a7;margin-bottom:2px">${edgeLo[k].toFixed(2)} – ${edgeHi[k].toFixed(2)} bp</div><div>Count: ${counts[k]} (${(counts[k]/n*100).toFixed(1)}%)</div>`;
    tt.style.display = 'block';
  });
  histEl.on('plotly_unhover', () => { tt.style.display = 'none'; });
}

/* ─── Stats grid ─────────────────────────────────────────────────── */
function renderStats(s) {
  if (!s || s.last == null) return;
  const bp = v => (v * 100).toFixed(2);
  const cards = [
    { label:'Last',             value: bp(s.last) + ' bp' },
    { label:'Mean',             value: bp(s.mean) + ' bp' },
    { label:'Off Average',      value: bp(s.off_avg) + ' bp' },
    { label:'Median',           value: bp(s.median) + ' bp' },
    { label:'StDev',            value: bp(s.stdev) + ' bp' },
    { label:'StDevs from Mean', value: s.stdev_from_mean.toFixed(2) },
    { label:'Percentile',       value: s.percentile.toFixed(1) + '%' },
    { label:'High',             value: bp(s.high) + ' bp', sub: s.high_date },
    { label:'Low',              value: bp(s.low)  + ' bp', sub: s.low_date  },
  ];
  document.getElementById('statsGrid').innerHTML = cards.map(c =>
    `<div class="stat-card"><div class="stat-label">${c.label}</div><div class="stat-value">${c.value}</div>${c.sub ? `<div class="stat-sub">${c.sub}</div>` : ''}</div>`
  ).join('');
}

/* ─── Spread interpretation ──────────────────────────────────────── */
function renderInterpretation(s) {
  const el = document.getElementById('spreadInterpret');
  if (!s || s.last == null) { el.style.display = 'none'; return; }

  const last = +(s.last * 100).toFixed(2), mean = +(s.mean * 100).toFixed(2);
  const median = +(s.median * 100).toFixed(2), offAvg = +(s.off_avg * 100).toFixed(2);
  const pct = +s.percentile.toFixed(1), sig = +s.stdev_from_mean.toFixed(2);
  const high = +(s.high * 100).toFixed(2), low = +(s.low * 100).toFixed(2);

  let pctSignal, pctView;
  if      (pct >= 90) { pctSignal='flat';  pctView=`At the <b>${pct}th percentile</b>, the spread is in the extreme upper tail — strong historical mean-reversion (flattening) bias.`; }
  else if (pct >= 75) { pctSignal='flat';  pctView=`At the <b>${pct}th percentile</b>, the spread is in the upper quartile with a bias toward reversion.`; }
  else if (pct >= 55) { pctSignal='flat';  pctView=`At the <b>${pct}th percentile</b>, the spread is modestly above average.`; }
  else if (pct >= 45) { pctSignal='neut';  pctView=`At the <b>${pct}th percentile</b>, the spread is near its historical centre — no strong directional bias.`; }
  else if (pct >= 25) { pctSignal='steep'; pctView=`At the <b>${pct}th percentile</b>, the spread is in the lower half with a modest steepening bias.`; }
  else if (pct >= 10) { pctSignal='steep'; pctView=`At the <b>${pct}th percentile</b>, the spread is in the bottom quartile — above-average steepening tendency.`; }
  else                { pctSignal='steep'; pctView=`At the <b>${pct}th percentile</b>, the spread is near its historical trough — strong steepening signal.`; }

  const absSig = Math.abs(sig);
  let sigTxt;
  if      (absSig >= 2.0) sigTxt = `<b>${sig > 0 ? '+' : ''}${sig}σ</b> — an extreme deviation; mean reversion is the strong base case.`;
  else if (absSig >= 1.5) sigTxt = `<b>${sig > 0 ? '+' : ''}${sig}σ</b> — a significant stretch.`;
  else if (absSig >= 1.0) sigTxt = `<b>${sig > 0 ? '+' : ''}${sig}σ</b> — notably off average.`;
  else if (absSig >= 0.5) sigTxt = `<b>${sig > 0 ? '+' : ''}${sig}σ</b> — modestly off average.`;
  else                    sigTxt = `<b>${sig > 0 ? '+' : ''}${sig}σ</b> — close to its mean.`;

  const offPct  = Math.abs(mean) > 0.01 ? (Math.abs(offAvg) / Math.abs(mean) * 100).toFixed(1) : '—';
  const range   = +(high - low).toFixed(2);
  const rangePct = range > 0 ? +((last - low) / range * 100).toFixed(0) : 50;
  const ord = n => { const s = Math.abs(n) % 100; if (s >= 11 && s <= 13) return 'th'; return ['th','st','nd','rd'][s % 10] || 'th'; };

  const curveText = pctSignal === 'flat'
    ? `Mean reversion implies <span class="signal-flat">FLATTENING</span>. Targets: median <b>${median} bp</b>, mean <b>${mean} bp</b>.`
    : pctSignal === 'steep'
    ? `Mean reversion implies <span class="signal-steep">STEEPENING</span>. Targets: median <b>${median} bp</b>, mean <b>${mean} bp</b>.`
    : `No strong directional bias — spread is near its historical centre (<b>${mean} bp</b>).`;

  el.style.display = 'block';
  el.innerHTML = `
    <div class="interp-title">Spread Interpretation</div>
    <p>${pctView} The spread is <b>${Math.abs(offAvg)} bp ${offAvg >= 0 ? 'above' : 'below'} the mean</b> (${offPct}% of mean). The spread is ${sigTxt}</p>
    <p>Range over period: <b>${low} – ${high} bp</b> (width ${range} bp); current level is at the ${rangePct}${ord(rangePct)} percentile of that range.</p>
    <p>${curveText}</p>`;
}

/* ═══════════════════════════════════════════════════════════════════════════
   DV01 CALCULATOR
   ═══════════════════════════════════════════════════════════════════════════ */
const BOND_COLORS = ['#2ed573', '#54a0ff'];

function buildCalc(data) {
  document.getElementById('calcPanel').style.display = 'block';
  const defSettle = defaultSettlement();

  document.getElementById('calcRows').innerHTML = _bonds.map((b, i) => {
    const initY = (data.last_yields && data.last_yields[i] != null) ? data.last_yields[i] : '';
    const initP = (data.last_prices && data.last_prices[i] != null) ? data.last_prices[i] : '';
    const initS = (data.last_settle && data.last_settle[i])         ? data.last_settle[i]  : defSettle;
    const defNot = i === 1 ? 10000 : '';   // default 10 000K on leg 2; leg 1 auto-matched
    const nameCell = `<td class="bond-name-cell ${i === 1 ? 'b2' : ''}" title="${esc(b.name||b.isin)}">${esc(b.name||b.isin)}</td>`;
    return `<tr>
      ${nameCell}
      <td><span class="num-wrap"><input type="number" step="0.01" id="cy_${i}" value="${initY}" placeholder="6.85" oninput="onField(${i},'yield')" /><span class="steppers"><button tabindex="-1" onclick="stepField('cy_${i}',0.01,'yield',${i})">▲</button><button tabindex="-1" onclick="stepField('cy_${i}',-0.01,'yield',${i})">▼</button></span></span></td>
      <td><span class="num-wrap"><input type="number" step="0.0001" id="cp_${i}" value="${initP}" placeholder="clean px" oninput="onField(${i},'price')" /><span class="steppers"><button tabindex="-1" onclick="stepField('cp_${i}',0.01,'price',${i})">▲</button><button tabindex="-1" onclick="stepField('cp_${i}',-0.01,'price',${i})">▼</button></span></span></td>
      <td><input type="text" class="editable" id="cn_${i}" value="${defNot ? fmtNot(defNot) : ''}" placeholder="000s" oninput="onField(${i},'notional')" onblur="fmtField(this,'not')" /></td>
      <td><input type="text" class="dv01-inp" id="cd_${i}" placeholder="—" oninput="onField(${i},'dv01Ron')" onblur="fmtField(this,'num')" /></td>
      <td><input type="text" class="dv01-inp" id="cu_${i}" placeholder="—" oninput="onField(${i},'dv01Usd')" onblur="fmtField(this,'num')" /></td>
      <td><input type="date" id="cs_${i}" value="${initS}" oninput="onField(${i},'settle')" /></td>
    </tr>`;
  }).join('');

  setTimeout(() => onField(1, 'notional'), 60);  // initial render
}

function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtNum(v) { return Number(v).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}).replace(/,/g, ' '); }
function fmtNot(v) { const r = Math.round(v / 5) * 5; return r.toLocaleString('en-US').replace(/,/g, ' '); }
function parseNum(s) { return parseFloat(String(s || '').replace(/[,   ]/g, '')); }
function gel(id) { return document.getElementById(id); }
function setVal(id, v) { const el = gel(id); if (el) el.value = v; }  // does NOT fire oninput
function fmtField(el, type) { const n = parseNum(el.value); if (!isNaN(n) && n > 0) el.value = type === 'not' ? fmtNot(n) : fmtNum(n); }
function stepField(id, delta, field, leg) {
  const el = gel(id); if (!el) return;
  const v = parseFloat(el.value) || 0;
  el.value = (v + delta).toFixed(field === 'price' ? 4 : 2);
  onField(leg, field);
}

let _busy = false;
let _calcTimer = null;

function onField(leg, field) {
  if (_busy) return;
  clearTimeout(_calcTimer);
  _calcTimer = setTimeout(() => doRecalc(leg, field), 120);
}

function doRecalc(anchor, field) {
  if (_busy) return;
  _busy = true;
  try {
    _doRecalcInner(anchor, field);
  } finally {
    _busy = false;
  }
}

function _doRecalcInner(anchor, field) {
  const other = 1 - anchor;
  const b  = _bonds[anchor];
  const bo = _bonds[other];
  const mat  = parseDate(b.maturity_date);
  const mato = parseDate(bo.maturity_date);
  const settle  = parseDate((gel(`cs_${anchor}`) || {}).value)  || parseDate(defaultSettlement());
  const settleo = parseDate((gel(`cs_${other}`)  || {}).value)  || parseDate(defaultSettlement());
  const ccy  = b.currency  || 'RON';
  const ccyo = bo.currency || 'RON';
  const fx  = _fxRates[ccy]  || _fxRates['RON'] || 4.55;
  const fxo = _fxRates[ccyo] || _fxRates['RON'] || 4.55;

  if (!mat || !mato) return;

  /* ── Step 1: resolve yield for anchor leg ── */
  let yld = parseFloat((gel(`cy_${anchor}`) || {}).value);

  if (field === 'price') {
    const px = parseFloat((gel(`cp_${anchor}`) || {}).value);
    if (!isNaN(px) && px > 0) {
      yld = yieldFromCleanPrice(b.coupon, px, mat, settle);
      setVal(`cy_${anchor}`, yld.toFixed(4));
    }
  } else if (field === 'dv01Ron' || field === 'dv01Usd') {
    // Back-calculate notional from the entered DV01
    if (!isNaN(yld)) {
      const dv01pk = calcDV01(b.coupon, yld, mat, settle, 1);
      if (dv01pk > 0) {
        let dv01Ron;
        if (field === 'dv01Ron') {
          dv01Ron = parseNum((gel(`cd_${anchor}`) || {}).value);
        } else {
          const dv01Usd = parseNum((gel(`cu_${anchor}`) || {}).value);
          dv01Ron = isNaN(dv01Usd) ? NaN : dv01Usd * fx;
        }
        if (!isNaN(dv01Ron) && dv01Ron > 0) {
          const notional = dv01Ron / dv01pk;
          setVal(`cn_${anchor}`, fmtNot(notional));
        }
      }
    }
  } else if (field === 'settle') {
    // Settlement changed — yields unchanged, everything else recomputed below
  }

  /* ── Step 2: update all derived fields for anchor leg ── */
  yld = parseFloat((gel(`cy_${anchor}`) || {}).value);
  if (isNaN(yld)) {
    ['cp','cd','cu'].forEach(f => setVal(`${f}_${anchor}`, ''));
    ['cp','cd','cu','cn'].forEach(f => setVal(`${f}_${other}`, ''));
    updateFooter();
    return;
  }

  // Price (skip if user just typed a price)
  if (field !== 'price') {
    const px = cleanPrice(b.coupon, yld, mat, settle);
    setVal(`cp_${anchor}`, px.toFixed(4));
  }

  const dv01pk = calcDV01(b.coupon, yld, mat, settle, 1);
  const notional = parseNum((gel(`cn_${anchor}`) || {}).value);
  const cnEl = gel(`cn_${anchor}`);
  if (!isNaN(notional) && notional > 0 && document.activeElement !== cnEl) setVal(`cn_${anchor}`, fmtNot(notional));
  let anchorDv01Ron = 0;

  if (!isNaN(notional) && notional > 0) {
    anchorDv01Ron = dv01pk * notional;
    const anchorDv01Usd = anchorDv01Ron / fx;
    if (field !== 'dv01Ron') setVal(`cd_${anchor}`, fmtNum(anchorDv01Ron));
    if (field !== 'dv01Usd') setVal(`cu_${anchor}`, fmtNum(anchorDv01Usd));
    // If user typed dv01Ron, sync dv01Usd and vice-versa
    if (field === 'dv01Ron') {
      const dv01Ron = parseNum((gel(`cd_${anchor}`) || {}).value);
      if (!isNaN(dv01Ron)) setVal(`cu_${anchor}`, fmtNum(dv01Ron / fx));
      anchorDv01Ron = dv01Ron || anchorDv01Ron;
    }
    if (field === 'dv01Usd') {
      const dv01Usd = parseNum((gel(`cu_${anchor}`) || {}).value);
      if (!isNaN(dv01Usd)) {
        anchorDv01Ron = dv01Usd * fx;
        setVal(`cd_${anchor}`, fmtNum(anchorDv01Ron));
      }
    }
  } else {
    setVal(`cd_${anchor}`, '');
    setVal(`cu_${anchor}`, '');
  }

  /* ── Step 3: cross-match other leg notional to anchor DV01 ── */
  const yldo = parseFloat((gel(`cy_${other}`) || {}).value);
  if (!isNaN(yldo) && anchorDv01Ron > 0) {
    const pxo   = cleanPrice(bo.coupon, yldo, mato, settleo);
    setVal(`cp_${other}`, pxo.toFixed(4));

    const dv01pko = calcDV01(bo.coupon, yldo, mato, settleo, 1);
    if (dv01pko > 0) {
      const matchedNoto = anchorDv01Ron / dv01pko;
      setVal(`cn_${other}`, fmtNot(matchedNoto));
      const dv01Rono = dv01pko * matchedNoto;
      setVal(`cd_${other}`, fmtNum(dv01Rono));
      setVal(`cu_${other}`, fmtNum(dv01Rono / fxo));
    }
  }

  updateFooter();
}

function updateFooter() {
  const y0 = parseFloat((gel('cy_0') || {}).value);
  const y1 = parseFloat((gel('cy_1') || {}).value);
  const d0 = parseNum((gel('cd_0') || {}).value);
  const d1 = parseNum((gel('cd_1') || {}).value);

  const spreadLbl = gel('spreadBpLabel');
  if (spreadLbl)
    spreadLbl.textContent = (!isNaN(y0) && !isNaN(y1))
      ? `Yield spread: ${((y1 - y0) * 100).toFixed(1)} bp` : '';

  const matchLbl = gel('dv01MatchLabel');
  if (matchLbl)
    matchLbl.textContent = (d0 > 0 && d1 > 0)
      ? `DV01 ratio: ${(d0 / d1).toFixed(3)}` : '';
}
</script>
