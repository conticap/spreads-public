<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spread Chart</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f1923; color: #c8d6e5; font-family: "Segoe UI", Tahoma, sans-serif; padding: 24px; }
  #header { margin-bottom: 18px; }
  #title { font-size: 1.2em; font-weight: 700; color: #c8d6e5; }
  #subtitle { font-size: 0.82em; color: #8395a7; margin-top: 4px; }
  #expiry-banner { display:none; background:#e74c3c; color:#fff; text-align:center; padding:12px; border-radius:6px; margin-bottom:16px; font-weight:700; }
  #chart { width:100%; height:420px; }
  #stats { display:flex; gap:16px; flex-wrap:wrap; margin-top:16px; }
  .stat-box { background:#1a2a3a; border:1px solid #2e3f50; border-radius:6px; padding:10px 16px; min-width:110px; }
  .stat-label { font-size:0.72em; color:#8395a7; margin-bottom:3px; }
  .stat-value { font-size:1.05em; font-weight:700; }
  #footer { margin-top:20px; font-size:0.75em; color:#4a6380; }
  #error { color:#e74c3c; padding:40px; text-align:center; font-size:1em; }
</style>
</head>
<body>

<div id="expiry-banner">This snapshot has expired and is no longer available.</div>
<div id="header">
  <div id="title">Loading...</div>
  <div id="subtitle"></div>
</div>
<div id="chart"></div>
<div id="stats"></div>
<div id="footer"></div>
<div id="error" style="display:none"></div>

<script>
const params = new URLSearchParams(location.search);
const slug = params.get('s');

if (!slug) {
  document.getElementById('error').style.display = '';
  document.getElementById('error').textContent = 'No spread specified. Add ?s=slug to the URL.';
  document.getElementById('header').style.display = 'none';
} else {
  const owner  = 'conticap';
  const repo   = 'spreads-public';
  const branch = 'main';
  const url    = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/data/${slug}.json`;

  fetch(url)
    .then(r => { if (!r.ok) throw new Error(`Snapshot not found (${r.status})`); return r.json(); })
    .then(data => {
      // Expiry check
      if (data.expires_at) {
        const exp = new Date(data.expires_at);
        if (Date.now() > exp.getTime()) {
          document.getElementById('expiry-banner').style.display = '';
          document.getElementById('header').style.display = 'none';
          document.getElementById('chart').style.display = 'none';
          document.getElementById('stats').style.display = 'none';
          return;
        }
        const expStr = exp.toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });
        document.getElementById('footer').textContent = `Snapshot published ${new Date(data.published_at || data.expires_at).toLocaleDateString()} · expires ${expStr}`;
      }

      const b1 = data.bond1.name || data.bond1.isin;
      const b2 = data.bond2.name || data.bond2.isin;
      document.title = `${b1} vs ${b2}`;
      document.getElementById('title').textContent = `${b1}  −  ${b2}`;
      document.getElementById('subtitle').textContent =
        `Spread · ${data.dates[0]} to ${data.dates[data.dates.length - 1]}`;

      // Scale to bp
      const spreadBp = data.spread.map(s => +( s * 100).toFixed(2));
      const maxVal = Math.max(...spreadBp), minVal = Math.min(...spreadBp);
      const maxIdx = spreadBp.indexOf(maxVal), minIdx = spreadBp.indexOf(minVal);

      const yMin = minVal, yMax = maxVal;
      const yPad = (yMax - yMin) * 0.08 || 2;
      const yRange = [yMin - yPad, yMax + yPad];

      // Fill areas
      const posClip = spreadBp.map(v => v >= 0 ? v : null);
      const negClip = spreadBp.map(v => v <= 0 ? v : null);

      const traces = [
        { x: data.dates, y: posClip, type: 'scatter', mode: 'none', fill: 'tozeroy', fillcolor: 'rgba(46,213,115,0.18)', hoverinfo: 'skip', showlegend: false, connectgaps: false },
        { x: data.dates, y: negClip, type: 'scatter', mode: 'none', fill: 'tozeroy', fillcolor: 'rgba(231,76,60,0.20)', hoverinfo: 'skip', showlegend: false, connectgaps: false },
        { x: data.dates, y: spreadBp, type: 'scatter', mode: 'lines', line: { color: '#e2e8f0', width: 1.5 }, hoverinfo: 'none', showlegend: false },
        { x: [data.dates[0], data.dates[data.dates.length-1]], y: [0,0], type: 'scatter', mode: 'lines', line: { color: '#4a6380', width: 1, dash: 'dash' }, showlegend: false, hoverinfo: 'skip' },
      ];

      // Mean line
      const shapes = [], annotations = [];
      if (data.stats && data.stats.mean != null) {
        const meanBp = +(data.stats.mean * 100).toFixed(2);
        shapes.push({ type: 'line', xref: 'x', yref: 'y', x0: data.dates[0], x1: data.dates[data.dates.length-1], y0: meanBp, y1: meanBp, line: { color: '#f39c12', width: 1, dash: 'dot' } });
        annotations.push({ xref: 'paper', yref: 'y', x: 0.01, y: meanBp, text: `Mean ${meanBp.toFixed(1)} bp`, showarrow: false, font: { size: 10, color: '#f39c12' }, xanchor: 'left', yanchor: 'bottom' });
      }
      annotations.push({ xref: 'paper', yref: 'paper', x: 0.01, y: 1.01, text: `${b1} − ${b2}`, showarrow: false, font: { size: 12, color: '#c8d6e5' }, xanchor: 'left', yanchor: 'bottom' });

      // Max/min dots
      let firstMax = true, firstMin = true;
      spreadBp.forEach((v, i) => {
        if (v === maxVal) {
          const r = firstMax ? 8 : 4;
          shapes.push({ type: 'circle', xref: 'x', yref: 'y', xsizemode: 'pixel', ysizemode: 'pixel', xanchor: data.dates[i], yanchor: v, x0: -r, x1: r, y0: -r, y1: r, fillcolor: '#2ed573', line: { color: '#ffffff', width: firstMax ? 1.5 : 1 }, opacity: 1 });
          firstMax = false;
        }
        if (v === minVal) {
          const r = firstMin ? 8 : 4;
          shapes.push({ type: 'circle', xref: 'x', yref: 'y', xsizemode: 'pixel', ysizemode: 'pixel', xanchor: data.dates[i], yanchor: v, x0: -r, x1: r, y0: -r, y1: r, fillcolor: '#e74c3c', line: { color: '#ffffff', width: firstMin ? 1.5 : 1 }, opacity: 1 });
          firstMin = false;
        }
      });

      const layout = {
        paper_bgcolor: '#0f1923', plot_bgcolor: '#0f1923',
        font: { color: '#c8d6e5', size: 11 },
        margin: { l: 55, r: 10, t: 28, b: 40 },
        showlegend: false,
        xaxis: { gridcolor: 'rgba(46,63,80,0.5)', tickfont: { size: 10, color: '#8395a7' }, linecolor: '#2e3f50' },
        yaxis: { gridcolor: 'rgba(46,63,80,0.5)', tickfont: { size: 10, color: '#8395a7' }, title: { text: 'Spread (bp)', font: { size: 11, color: '#8395a7' } }, range: yRange, zeroline: false, linecolor: '#2e3f50' },
        shapes, annotations, hovermode: 'x',
      };

      const lineEl = document.getElementById('chart');
      Plotly.newPlot(lineEl, traces, layout, { responsive: true, displayModeBar: false });

      // Custom tooltip
      const tt = document.createElement('div');
      tt.style.cssText = 'position:fixed;pointer-events:none;display:none;background:#1a2a3a;border:1px solid #2e3f50;border-radius:6px;padding:8px 12px;z-index:100;';
      document.body.appendChild(tt);
      lineEl.on('plotly_hover', ev => {
        const pt = ev.points.find(p => p.curveNumber === 2);
        if (!pt) return;
        const col = pt.y >= 0 ? '#2ed573' : '#e74c3c';
        const prefix = pt.y === spreadBp[maxIdx] ? 'Max: ' : pt.y === spreadBp[minIdx] ? 'Min: ' : '';
        tt.innerHTML = `<div style="color:#8395a7;font-size:11px;margin-bottom:3px">${pt.x}</div><div style="color:${col};font-size:14px;font-weight:600">${prefix}${pt.y >= 0 ? '+' : ''}${pt.y.toFixed(2)} bp</div>`;
        tt.style.display = 'block';
      });
      lineEl.on('plotly_unhover', () => { tt.style.display = 'none'; });
      document.addEventListener('mousemove', e => { tt.style.left = (e.clientX + 14) + 'px'; tt.style.top = (e.clientY - 10) + 'px'; });

      // Stats
      if (data.stats) {
        const s = data.stats;
        const last = spreadBp[spreadBp.length - 1];
        const statsEl = document.getElementById('stats');
        const fmtBp = v => v != null ? (+(v * 100).toFixed(2)) + ' bp' : '—';
        const fmtZ  = v => v != null ? v.toFixed(2) : '—';
        [
          ['Last', `${last >= 0 ? '+' : ''}${last.toFixed(2)} bp`, last >= 0 ? '#2ed573' : '#e74c3c'],
          ['Max',  fmtBp(s.max),  '#2ed573'],
          ['Min',  fmtBp(s.min),  '#e74c3c'],
          ['Mean', fmtBp(s.mean), '#f39c12'],
          ['Z-score', fmtZ(s.zscore), '#a29bfe'],
        ].forEach(([label, val, col]) => {
          const box = document.createElement('div');
          box.className = 'stat-box';
          box.innerHTML = `<div class="stat-label">${label}</div><div class="stat-value" style="color:${col}">${val}</div>`;
          statsEl.appendChild(box);
        });
      }
    })
    .catch(e => {
      document.getElementById('error').style.display = '';
      document.getElementById('error').textContent = e.message;
      document.getElementById('header').style.display = 'none';
      document.getElementById('chart').style.display = 'none';
    });
}
</script>
</body>
</html>
